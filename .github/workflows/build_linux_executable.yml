name: Build Linux Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 网页上通过按钮手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v5

    - name: 安装加密编译工具 (shc) 和 gcc
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get install -y shc gcc dos2unix

    - name: 使用 shc 编译 shell 脚本
      run: |
        set -euxo pipefail
        # 将 Windows 换行符(CRLF) 转换为 Linux 换行符(LF)，防止 shc 编译报错
        cp install.sh install.build.sh
        dos2unix install.build.sh
        # shc 对 /usr/bin/env bash 兼容性不稳定，构建时统一替换为 /bin/bash
        sed -i '1s|^#!.*|#!/bin/bash|' install.build.sh
        chmod +x install.build.sh
        # 编译脚本并输出详细日志
        shc -v -f install.build.sh -o openclaw_installer_linux
        test -f openclaw_installer_linux
        chmod +x openclaw_installer_linux

    - name: 上传打包好的可执行文件
      uses: actions/upload-artifact@v4
      with:
        name: openclaw_installer_linux
        path: openclaw_installer_linux
        retention-days: 7 # 自动保留 7 天
